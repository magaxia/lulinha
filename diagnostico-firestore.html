<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Diagnóstico Firestore</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .container {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 12px;
            margin: 10px 0;
        }
        h2 {
            color: #00ff88;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 10px;
        }
        .data {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            font-family: monospace;
            word-break: break-all;
        }
        .error {
            background: rgba(255, 0, 0, 0.3);
            border-left: 3px solid red;
            padding: 10px;
        }
        .success {
            background: rgba(0, 255, 0, 0.3);
            border-left: 3px solid green;
            padding: 10px;
        }
        button {
            background: #00ff88;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover {
            background: #00ff55;
        }
    </style>
</head>
<body>
    <h1>🔍 Diagnóstico do Firestore</h1>
    
    <button onclick="testarAutenticacao()">1️⃣ Testar Autenticação</button>
    <button onclick="testarColecoesComissoes()">2️⃣ Testar Coleção Comissões</button>
    <button onclick="testarColecoesIndicacoes()">3️⃣ Testar Coleção Indicações</button>
    <button onclick="testarUsuarioAtual()">4️⃣ Testar Usuário Atual</button>
    <button onclick="limparLogs()">🗑️ Limpar Logs</button>

    <div id="output"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="sistema-auth.js"></script>

    <script>
        function log(titulo, dados, tipo = 'info') {
            const output = document.getElementById('output');
            const className = tipo === 'error' ? 'error' : tipo === 'success' ? 'success' : 'data';
            const html = `<div class="container">
                <h2>${titulo}</h2>
                <div class="${className}">
                    ${JSON.stringify(dados, null, 2)}
                </div>
            </div>`;
            output.innerHTML += html;
        }

        function limparLogs() {
            document.getElementById('output').innerHTML = '';
        }

        function testarAutenticacao() {
            log('🔐 Testando Autenticação...', 'Iniciando...');
            
            window.SistemaAuth.verificarLogin((autenticado, dadosUsuario) => {
                if (autenticado) {
                    log('✅ Usuário Autenticado', dadosUsuario, 'success');
                } else {
                    log('❌ Usuário NÃO autenticado', 'Não há usuário logado', 'error');
                }
            });
        }

        async function testarColecoesComissoes() {
            log('📊 Testando Coleção Comissões...', 'Buscando...');
            
            window.SistemaAuth.verificarLogin(async (autenticado, dadosUsuario) => {
                if (!autenticado) {
                    log('❌ Erro', 'Usuário não autenticado', 'error');
                    return;
                }

                try {
                    const uid = dadosUsuario.uid;
                    const db = window.SistemaAuth.db;
                    
                    // 1. Verificar se a coleção existe
                    const comissoesSnapshot = await db.collection('comissoes').limit(1).get();
                    log('📁 Coleção "comissoes" existe?', {
                        existe: !comissoesSnapshot.empty,
                        totalDocs: comissoesSnapshot.size
                    }, comissoesSnapshot.empty ? 'error' : 'success');
                    
                    // 2. Busca com filtro usuarioId
                    const filtrousuarioId = await db.collection('comissoes').where('usuarioId', '==', uid).get();
                    log('🔍 Busca por usuarioId == ' + uid, {
                        encontrados: filtrousuarioId.size,
                        dados: filtrousuarioId.docs.map(d => d.data())
                    }, filtrousuarioId.size > 0 ? 'success' : 'error');
                    
                    // 3. Busca com filtro uid
                    const filtrouid  = await db.collection('comissoes').where('uid', '==', uid).get();
                    log('🔍 Busca por uid == ' + uid, {
                        encontrados: filtrouid.size,
                        dados: filtrouid.docs.map(d => d.data())
                    });
                    
                    // 4. Busca com filtro userId
                    const filtrouperId = await db.collection('comissoes').where('userId', '==', uid).get();
                    log('🔍 Busca por userId == ' + uid, {
                        encontrados: filtrouperId.size,
                        dados: filtrouperId.docs.map(d => d.data())
                    });
                    
                    // 5. Listar primeiros documentos da coleção
                    const primeiros = await db.collection('comissoes').limit(3).get();
                    log('📄 Primeiros 3 documentos da coleção', {
                        total: primeiros.size,
                        dados: primeiros.docs.map(d => ({id: d.id, data: d.data()}))
                    }, 'info');
                    
                } catch (error) {
                    log('❌ Erro ao testar comissões', error.message, 'error');
                }
            });
        }

        async function testarColecoesIndicacoes() {
            log('👥 Testando Coleção Indicações...', 'Buscando...');
            
            window.SistemaAuth.verificarLogin(async (autenticado, dadosUsuario) => {
                if (!autenticado) {
                    log('❌ Erro', 'Usuário não autenticado', 'error');
                    return;
                }

                try {
                    const uid = dadosUsuario.uid;
                    const db = window.SistemaAuth.db;
                    
                    // 1. Verificar se a coleção existe
                    const indicacoesSnapshot = await db.collection('indicacoes').limit(1).get();
                    log('📁 Coleção "indicacoes" existe?', {
                        existe: !indicacoesSnapshot.empty,
                        totalDocs: indicacoesSnapshot.size
                    }, indicacoesSnapshot.empty ? 'error' : 'success');
                    
                    // 2. Busca com filtro idIndicador
                    const filtroIdIndicador = await db.collection('indicacoes').where('idIndicador', '==', uid).get();
                    log('🔍 Busca por idIndicador == ' + uid, {
                        encontrados: filtroIdIndicador.size,
                        dados: filtroIdIndicador.docs.map(d => d.data())
                    }, filtroIdIndicador.size > 0 ? 'success' : 'error');
                    
                    // 3. Listar primeiros documentos
                    const primeiros = await db.collection('indicacoes').limit(3).get();
                    log('📄 Primeiros 3 documentos da coleção', {
                        total: primeiros.size,
                        dados: primeiros.docs.map(d => ({id: d.id, data: d.data()}))
                    }, 'info');
                    
                } catch (error) {
                    log('❌ Erro ao testar indicações', error.message, 'error');
                }
            });
        }

        async function testarUsuarioAtual() {
            log('👤 Testando Dados do Usuário Atual...', 'Buscando...');
            
            window.SistemaAuth.verificarLogin(async (autenticado, dadosUsuario) => {
                if (!autenticado) {
                    log('❌ Erro', 'Usuário não autenticado', 'error');
                    return;
                }

                try {
                    const uid = dadosUsuario.uid;
                    const db = window.SistemaAuth.db;
                    
                    const snap = await db.collection('users').doc(uid).get();
                    
                    if (snap.exists) {
                        log('✅ Usuário encontrado', {
                            uid: uid,
                            dados: snap.data()
                        }, 'success');
                    } else {
                        log('❌ Usuário não encontrado no Firestore', {uid: uid}, 'error');
                    }
                } catch (error) {
                    log('❌ Erro ao testar usuário', error.message, 'error');
                }
            });
        }
    </script>
</body>
</html>

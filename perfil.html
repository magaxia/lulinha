<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Perfil | Magaxia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Sistema de Autenticação Centralizado -->
<script src="sistema-auth.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-attachment:fixed;
  display:flex;
  justify-content:center;
  color:black;
  position:relative;
  overflow-x:hidden;
  padding:20px 0;
}

body::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.4) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(240, 147, 251, 0.4) 0%, transparent 50%);
  pointer-events:none;
  animation:float 15s ease-in-out infinite;
}

@keyframes float{
  0%, 100%{transform:translate(0, 0)}
  50%{transform:translate(20px, -20px)}
}

.container{
  padding:40px 20px;
  max-width:500px;
  width:100%;
  text-align:center;
  position:relative;
  z-index:1;
  animation:slideIn 0.6s ease-out;
}

@keyframes slideIn{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

h1{
  font-size:2.5rem;
  font-weight:800;
  letter-spacing:2px;
  margin-bottom:20px;
  text-shadow:0 4px 20px rgba(0,0,0,0.3);
  background:linear-gradient(90deg,#ffffff,#e0e7ff);
  background-clip:text;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  margin-top:20px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:30px 25px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  transition:all 0.3s ease;
}

.card:hover{
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.3);
  box-shadow:0 25px 75px rgba(0,0,0,0.35);
}

.label{
  font-size:.9rem;
  font-weight:600;
  color:black;
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:8px;
}

.value{
  font-size:1.15rem;
  font-weight:700;
  color:black;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:16px;
  margin-top:15px;
  border-radius:15px;
  border:none;
  text-align:center;
  font-family:'Poppins',sans-serif;
  font-weight:600;
  font-size:1rem;
  cursor:pointer;
  background:linear-gradient(135deg,#39c6ff,#b84cff);
  color:black;
  transition:all 0.3s ease;
  position:relative;
  z-index:2;
  box-shadow:0 8px 25px rgba(57,198,255,0.3);
}

button::after{
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  transform:translate(-50%, -50%);
  transition:width 0.6s, height 0.6s;
  pointer-events:none;
}

button:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 35px rgba(57,198,255,0.4);
}

.btn-primary{
  background:linear-gradient(135deg,#39c6ff,#b84cff);
  color:black;
}

.btn-danger{
  background:linear-gradient(135deg, #ff6b6b, #ff5252);
  color:black;
  margin-top:10px;
}

.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  z-index:1000;
  background:rgba(255,255,255,0.2);
  border:2px solid rgba(255,255,255,0.3);
  border-radius:50%;
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:black;
  font-size:1.5rem;
  transition:all 0.3s ease;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.back-btn:hover{
  background:rgba(255,255,255,0.3);
  border-color:rgba(255,255,255,0.5);
  transform:translateX(-5px);
}

</style>
</head>
<body>

<a href="painel.html" class="back-btn">←</a>

<div class="container">
  <h1>🧑 Meu Perfil</h1>

  <div class="card">
    <div class="label">Nome</div>
    <div class="value" id="nome">---</div>

    <div class="label">Telefone</div>
    <div class="value" id="telefone">---</div>

    <div class="label">ID do Usuário</div>
    <div class="value" id="uid">---</div>
  </div>

  <!-- 💰 SALDO E COMISSÃO -->
  <div class="card">
    <div class="label">💰 Saldo</div>
    <div class="value" id="saldo">R$ 0,00</div>

    <div class="label">💸 Saldo de Comissões</div>
    <div class="value" id="saldoComissao">R$ 0,00</div>

    <div class="label">🎁 Comissão Total</div>
    <div class="value" id="comissaoTotal">R$ 0,00</div>

    <div class="label" style="margin-top: 15px;">👥 Total Indicados</div>
    <div class="value" id="totalIndicados">0</div>
  </div>

  <!-- 🔗 INDICAÇÃO -->
  <div class="card">
    <div class="label">🔗 Seu Código de Indicação</div>
    <div class="value" id="codigoIndicacao">---</div>

    <div class="label">Link de Convite</div>
    <input type="text" id="linkIndicacao" readonly style="margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: black;">
    <button class="btn-primary" onclick="copiarLink()" style="margin-top: 10px;">📋 Copiar Link</button>
  </div>

  <button class="btn-danger" onclick="logout()">🚪 Sair da conta</button>
</div>



<script>
// 🔐 Proteção de acesso e dados do perfil
document.addEventListener('DOMContentLoaded', function() {
  console.log('🔐 Verificando autenticação no perfil...');

  // Usar Firebase Auth diretamente para evitar cache
  firebase.auth().onAuthStateChanged(user => {
    if (!user) {
      console.log('❌ Usuário não autenticado, redirecionando para login...');
      window.location.href = 'login.html';
      return;
    }

    console.log('✅ Usuário autenticado, carregando dados FRESCOS do Firestore...');
    const uid = user.uid;

    // SEMPRE buscar dados ATUAIS do Firestore, ignorando QUALQUER cache
    buscarUsuarioFirestore(uid, user.email, user.phoneNumber)
      .then(result => {
        if (!result) {
          console.error('❌ Usuário não encontrado no Firestore:', uid);
          alert('Erro: Usuário não encontrado. Faça login novamente.');
          window.location.href = 'login.html';
          return;
        }

        const dados = result.data();
        const docId = result.id || uid;
        console.log('📊 Dados FRESCOS carregados do Firestore:', dados, 'documentId:', docId);

        // Exibir dados 100% ATUAIS do Firestore
        document.getElementById('uid').innerText = docId || '---';
        document.getElementById('nome').innerText = dados.nome || 'Usuário';
        document.getElementById('telefone').innerText = dados.telefone || 'Não informado';

        // Carregar comissões com dados frescos
        const codigoIndicacao = dados.codigoIndicacao || docId;
        carregarComissoes(docId, codigoIndicacao);

        // Escutar atualizações em tempo real
        escutarAtualizacoes(docId);
      })
      .catch(error => {
        console.error('❌ Erro ao carregar dados do Firestore:', error);
        alert('Erro ao carregar dados. Tente novamente.');
      });
  });
});

function buscarUsuarioFirestore(uid, email, telefone) {
  const db = window.SistemaAuth.db;
  return db.collection('users').doc(uid).get().then(doc => {
    if (doc.exists) {
      return doc;
    }

    const queries = [];
    if (email) {
      queries.push(db.collection('users').where('email', '==', email).limit(1).get());
    }
    if (telefone) {
      queries.push(db.collection('users').where('telefone', '==', telefone).limit(1).get());
    }

    return Promise.all(queries).then(results => {
      for (const snapshot of results) {
        if (snapshot && !snapshot.empty) {
          console.warn('⚠️ UID não encontrado por ID; usando fallback por email/telefone');
          return snapshot.docs[0];
        }
      }
      return null;
    });
  });
}

function carregarComissoes(uid, codigoIndicacao) {
  const db = window.SistemaAuth.db;
  
  try {
    console.log('💰 Carregando comissões para UID:', uid);
    db.collection("users").doc(uid).get().then(doc => {
      if (doc.exists) {
        const dados = doc.data();
        console.log('📊 Dados completos do usuário para comissões:', dados);
        
        // Mostrar saldo
        const saldo = dados.saldo || 0;
        document.getElementById('saldo').innerText = `R$ ${saldo.toFixed(2).replace('.', ',')}`;
        console.log('💵 Saldo atualizado:', saldo);
        
        // Mostrar saldo de comissões
        const saldoComissao = dados.saldoComissao || 0;
        document.getElementById('saldoComissao').innerText = `R$ ${saldoComissao.toFixed(2).replace('.', ',')}`;
        console.log('💰 Saldo de comissões atualizado:', saldoComissao);
        
        // Mostrar comissão total
        const comissaoTotal = dados.comissaoTotal || 0;
        document.getElementById('comissaoTotal').innerText = `R$ ${comissaoTotal.toFixed(2).replace('.', ',')}`;
        console.log('📈 Comissão total atualizada:', comissaoTotal);
        
        // Mostrar total de indicados
        const totalIndicados = dados.totalIndicados || 0;
        document.getElementById('totalIndicados').innerText = totalIndicados;
        console.log('👥 Total de indicados atualizado:', totalIndicados);
        
        // Mostrar código de indicação (UID)
        document.getElementById('codigoIndicacao').innerText = uid;
        
        // Gerar link de indicação
        const linkIndicacao = `https://magaxia.github.io/magaxia/?ref=${uid}`;
        document.getElementById('linkIndicacao').value = linkIndicacao;
        console.log('🔗 Link de indicação gerado:', linkIndicacao);
      } else {
        console.error('❌ Documento do usuário não encontrado para comissões');
      }
    }).catch(error => {
      console.error('❌ Erro ao carregar dados para comissões:', error);
    });
  } catch(erro) {
    console.error('❌ Erro geral em carregarComissoes:', erro);
  }
}

function escutarAtualizacoes(uid) {
  const db = window.SistemaAuth.db;
  console.log('👂 Iniciando escuta de atualizações em tempo real para UID:', uid);
  
  // Escutar mudanças em tempo real
  db.collection("users").doc(uid).onSnapshot(doc => {
    if (doc.exists) {
      const dados = doc.data();
      console.log('🔄 Atualização em tempo real recebida:', dados);
      
      // Atualizar nome e telefone em tempo real
      const nomeAtual = dados.nome || 'Usuário';
      const telefoneAtual = dados.telefone || 'Não informado';
      document.getElementById('nome').innerText = nomeAtual;
      document.getElementById('telefone').innerText = telefoneAtual;
      console.log('👤 Nome/telefone atualizados:', nomeAtual, telefoneAtual);
      
      // Atualizar saldo
      const saldo = dados.saldo || 0;
      document.getElementById('saldo').innerText = `R$ ${saldo.toFixed(2).replace('.', ',')}`;
      console.log('💵 Saldo atualizado em tempo real:', saldo);
      
      // Atualizar saldo de comissões
      const saldoComissao = dados.saldoComissao || 0;
      document.getElementById('saldoComissao').innerText = `R$ ${saldoComissao.toFixed(2).replace('.', ',')}`;
      console.log('💰 Saldo de comissões atualizado em tempo real:', saldoComissao);
      
      // Atualizar comissão total
      const comissaoTotal = dados.comissaoTotal || 0;
      document.getElementById('comissaoTotal').innerText = `R$ ${comissaoTotal.toFixed(2).replace('.', ',')}`;
      console.log('📈 Comissão total atualizada em tempo real:', comissaoTotal);
      
      // Atualizar total de indicados
      const totalIndicados = dados.totalIndicados || 0;
      document.getElementById('totalIndicados').innerText = totalIndicados;
      console.log('👥 Total de indicados atualizado em tempo real:', totalIndicados);
    } else {
      console.warn('⚠️ Documento não existe no listener em tempo real');
    }
  }, error => {
    console.error('❌ Erro no listener em tempo real:', error);
  });
}

function copiarLink() {
  const link = document.getElementById('linkIndicacao');
  link.select();
  document.execCommand('copy');
  alert('✅ Link de indicação copiado!');
}

function logout() {
  window.SistemaAuth.fazerLogout();
}
</script>

</body>
</html>

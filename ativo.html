<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ativos | Magaxia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            color: black;
            position: relative;
            overflow-x: hidden;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(240, 147, 251, 0.4) 0%, transparent 50%);
            pointer-events: none;
            animation: float 15s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {transform: translate(0, 0)}
            50% {transform: translate(20px, -20px)}
        }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 45px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(90deg, #ffffff, #e0e7ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icone {
            font-size: 4rem;
            margin: 25px 0;
            opacity: 0.95;
        }

        .mensagem {
            font-size: 1.05rem;
            opacity: 0.95;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .contador {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ffffff;
            font-weight: bold;
            opacity: 0.95;
        }

        .btn {
            display: inline-block;
            padding: 16px 34px;
            border-radius: 15px;
            text-decoration: none;
            color: black;
            font-size: 1rem;
            background: linear-gradient(135deg, #39c6ff, #b84cff);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(57, 198, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(57, 198, 255, 0.4);
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        /* barra inferior removida */
        .back-btn{
            position:fixed;
            top:20px;
            left:20px;
            z-index:1000;
            background:rgba(255,255,255,0.15);
            border:2px solid rgba(255,255,255,0.18);
            border-radius:50%;
            width:50px;
            height:50px;
            display:flex;
            align-items:center;
            justify-content:center;
            text-decoration:none;
            color:black;
            font-size:1.4rem;
            transition:all 0.25s ease;
            backdrop-filter:blur(8px);
        }

        .back-btn:hover{
            background:rgba(255,255,255,0.22);
            transform:translateX(-5px);
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Sistema de Autenticação Centralizado -->
    <script src="sistema-auth.js"></script>
</head>
<body>

    <a href="painel.html" class="back-btn">←</a>

    <!-- Botão de logout -->
    <button style="position:absolute; top:20px; right:20px; background:#ff4757; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:12px;" onclick="logout()">🚪 Sair</button>

    <div class="container">
        <h1>📊 Ativos</h1>

        <div class="icone">📭</div>

        <div class="contador">
            Ativos: <span id="ativosCount">0</span>
        </div>

        <div id="ativosList">
            <p class="mensagem">
                Você ainda não possui ativos ativos no sistema.<br>
                Comece investindo para gerar renda diária automática.
            </p>
        </div>

        <a href="produtos.html" class="btn">💻 Ver Produtos</a>
    </div>

    <!-- barra inferior removida -->

    <script>
        // Variáveis globais
        let uid = null;

        // Verificar autenticação
        document.addEventListener('DOMContentLoaded', function() {
            window.SistemaAuth.verificarLogin((autenticado, dadosUsuario) => {
                if (!autenticado) {
                    window.location.href = 'index.html'; // ou login.html
                    return;
                }

                uid = dadosUsuario.uid;
                carregarAtivos();
            });
        });

        // Carregar ativos do usuário
        function carregarAtivos() {
            const listDiv = document.getElementById('ativosList');
            const countSpan = document.getElementById('ativosCount');

            window.SistemaAuth.db.collection("compras")
                .where("uid", "==", uid)
                .where("status", "==", "ativo")
                .onSnapshot((snapshot) => {
                    const ativos = [];
                    snapshot.forEach((doc) => {
                        ativos.push({ id: doc.id, data: doc.data() });
                    });

                    countSpan.innerText = ativos.length;

                    if (ativos.length === 0) {
                        listDiv.innerHTML = `
                            <p class="mensagem">
                                Você ainda não possui ativos ativos no sistema.<br>
                                Comece investindo para gerar renda diária automática.
                            </p>
                        `;
                        return;
                    }

                    // Mostrar lista de ativos
                    let html = '<div style="text-align: left; margin-bottom: 20px;">';
                    ativos.forEach((ativo) => {
                        const data = ativo.data;
                        const inicio = data.inicio ? data.inicio.toDate().toLocaleDateString('pt-BR') : 'N/A';
                        html += `
                            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 10px; color: black;">
                                <strong>${data.produto}</strong><br>
                                Valor: R$ ${data.valor.toFixed(2)}<br>
                                Renda Diária: R$ ${data.rendaDiaria.toFixed(2)}<br>
                                Ciclo: ${data.ciclo} dias<br>
                                Início: ${inicio}
                            </div>
                        `;
                    });
                    html += '</div>';
                    listDiv.innerHTML = html;
                }, (error) => {
                    console.error("Erro ao carregar ativos:", error);
                    listDiv.innerHTML = '<p class="mensagem" style="color: red;">Erro ao carregar ativos.</p>';
                });
        }

        function logout() {
          window.SistemaAuth.fazerLogout();
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saldos do Usuário</title>
    <!-- Firebase em modo compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Sistema de Autenticação Centralizado -->
    <script src="sistema-auth.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .saldo-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: auto;
        }
        .saldo-item {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .saldo-value {
            font-weight: bold;
            color: #28a745;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .historico {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
        }
        .historico-item {
            margin-bottom: 5px;
            font-size: 14px;
        }
    </style>
    <script>
        // Inicializar sistema de autenticação
        SistemaAuth.inicializar();

        // Variáveis globais
        let currentUser = null;
        let unsubscribe = null;

        // Função para formatar valor como moeda brasileira
        function formatarMoeda(valor) {
            return 'R$ ' + valor.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        // Carregar saldos do Firestore
        async function carregarSaldosFirestore(uid) {
            const userDocRef = SistemaAuth.db.collection('users').doc(uid);
            const userDoc = await userDocRef.get();
            if (userDoc.exists) {
                const data = userDoc.data();
                document.getElementById('saldoRecarga').textContent = formatarMoeda(data.saldoRecarga || 0);
                document.getElementById('saldoSaque').textContent = formatarMoeda(data.saldoSaque || 0);
                carregarHistorico(data.historico || []);
            } else {
                // Criar documento inicial se não existir
                await userDocRef.set({
                    saldoRecarga: 0,
                    saldoSaque: 0,
                    historico: [],
                    dataAtualizacao: SistemaAuth.firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('saldoRecarga').textContent = formatarMoeda(0);
                document.getElementById('saldoSaque').textContent = formatarMoeda(0);
                carregarHistorico([]);
            }
        }

        // Atualizar saldos no Firestore
        async function atualizarSaldoFirestore(uid, saldoRecarga, saldoSaque) {
            const userDocRef = SistemaAuth.db.collection('users').doc(uid);
            await userDocRef.update({
                saldoRecarga: saldoRecarga,
                saldoSaque: saldoSaque,
                dataAtualizacao: SistemaAuth.firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // Registrar histórico no Firestore
        async function registrarHistoricoFirestore(uid, movimentacao) {
            const userDocRef = SistemaAuth.db.collection('users').doc(uid);
            await userDocRef.update({
                historico: SistemaAuth.firebase.firestore.FieldValue.arrayUnion(movimentacao)
            });
        }

        // Carregar histórico na tela
        function carregarHistorico(historico) {
            const historicoList = document.getElementById('historicoList');
            historicoList.innerHTML = '';
            historico.forEach(item => {
                const div = document.createElement('div');
                div.className = 'historico-item';
                div.textContent = item;
                historicoList.appendChild(div);
            });
        }

        // Função para transferir recarga para saque
        async function transferirRecarga() {
            if (!currentUser) {
                alert('Usuário não logado.');
                return;
            }
            const valor = parseFloat(prompt('Digite o valor a transferir:'));
            if (isNaN(valor) || valor <= 0) {
                alert('Valor inválido.');
                return;
            }
            const userDocRef = SistemaAuth.db.collection('users').doc(currentUser.uid);
            const userDoc = await userDocRef.get();
            if (!userDoc.exists) {
                alert('Dados do usuário não encontrados.');
                return;
            }
            const data = userDoc.data();
            const saldoRecarga = data.saldoRecarga || 0;
            if (valor > saldoRecarga) {
                alert('Saldo de recarga insuficiente.');
                return;
            }
            // Atualizar saldos
            const novoSaldoRecarga = saldoRecarga - valor;
            const novoSaldoSaque = (data.saldoSaque || 0) + valor;
            await atualizarSaldoFirestore(currentUser.uid, novoSaldoRecarga, novoSaldoSaque);
            // Registrar no histórico
            const dataHora = new Date().toLocaleString();
            const movimentacao = `${dataHora}: Transferência de R$ ${valor.toFixed(2).replace('.', ',')} de Recarga para Saque`;
            await registrarHistoricoFirestore(currentUser.uid, movimentacao);
            // A tela será atualizada automaticamente pelo onSnapshot
        }

        // Configurar listener para mudanças em tempo real
        function configurarListener(uid) {
            const userDocRef = SistemaAuth.db.collection('users').doc(uid);
            unsubscribe = userDocRef.onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('saldoRecarga').textContent = formatarMoeda(data.saldoRecarga || 0);
                    document.getElementById('saldoSaque').textContent = formatarMoeda(data.saldoSaque || 0);
                    carregarHistorico(data.historico || []);
                }
            });
        }

        // Verificar estado de autenticação
        SistemaAuth.auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                carregarSaldosFirestore(user.uid);
                configurarListener(user.uid);
            } else {
                alert('Usuário não logado. Faça login primeiro.');
                // Redirecionar para página de login se necessário
                window.location.href = 'login.html';
            }
        });

        // Função de logout
        function logout() {
            if (unsubscribe) {
                unsubscribe();
            }
            localStorage.removeItem('usuarioLogado');
            localStorage.removeItem('uid');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="saldo-container">
        <h2>Saldos do Usuário</h2>
        <div class="saldo-item">
            Saldo de Recarga: <span id="saldoRecarga" class="saldo-value">R$ 0,00</span>
        </div>
        <div class="saldo-item">
            Saldo de Saque: <span id="saldoSaque" class="saldo-value">R$ 0,00</span>
        </div>
        <button onclick="transferirRecarga()">Transferir Recarga para Saque</button>
        <button onclick="logout()" style="background-color: #dc3545; margin-left: 10px;">Sair</button>
        <div class="historico">
            <h3>Histórico de Movimentações</h3>
            <div id="historicoList"></div>
        </div>
    </div>
</body>
</html>

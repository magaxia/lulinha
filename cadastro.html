<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Magaxia - Cadastro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Sistema de Autenticação Centralizado -->
<script src="sistema-auth.js"></script>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 50%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
}

.container {
    max-width: 460px;
    width: 90%;
    padding: 50px 40px;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.logo-section {
    text-align: center;
    margin-bottom: 30px;
}

.logo-icon {
    font-size: 3rem;
    margin-bottom: 15px;
    background: linear-gradient(135deg, #22c55e, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #22c55e, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.subtitle {
    font-size: 0.95rem;
    color: #cbd5e1;
    margin-bottom: 30px;
    font-weight: 300;
}

.form-group {
    margin-bottom: 16px;
    position: relative;
}

.form-group label {
    display: block;
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 8px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input, button {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s ease;
}

input {
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
}

input::placeholder {
    color: #64748b;
}

input:focus {
    outline: none;
    background: rgba(255, 255, 255, 0.08);
    border-color: #22c55e;
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
}

input[readonly] {
    opacity: 0.6;
    cursor: not-allowed;
    background: rgba(255, 255, 255, 0.03);
}

button {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    border: none;
    margin-top: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
}

button:hover::before {
    left: 100%;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
}

button:active {
    transform: translateY(0);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    box-shadow: 0 2px 8px rgba(34, 197, 94, 0.1);
}

.msg {
    margin-top: 12px;
    font-size: 0.9rem;
    color: #3b82f6;
    padding: 8px 12px;
    background: rgba(59, 130, 246, 0.1);
    border-radius: 8px;
    border-left: 3px solid #3b82f6;
}

.divider {
    display: flex;
    align-items: center;
    margin: 24px 0;
    color: #64748b;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
}

.divider span {
    padding: 0 12px;
    font-size: 0.85rem;
}

.footer-link {
    margin-top: 20px;
    font-size: 0.95rem;
    color: #cbd5e1;
}

.footer-link a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
}

.footer-link a:hover {
    color: #22c55e;
    text-decoration: underline;
}

.features {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.feature-item {
    flex: 1;
    text-align: center;
    font-size: 0.8rem;
    color: #94a3b8;
}

.feature-item i {
    display: block;
    color: #22c55e;
    margin-bottom: 6px;
    font-size: 1.2rem;
}

@media (max-width: 480px) {
    .container {
        padding: 30px 20px;
        border-radius: 16px;
    }
    
    h1 {
        font-size: 1.5rem;
    }
    
    input, button {
        padding: 12px 14px;
        font-size: 0.9rem;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="logo-section">
        <div class="logo-icon">💎</div>
        <h1>Magaxia</h1>
        <p class="subtitle">Comece sua jornada agora mesmo</p>
    </div>

    <div class="form-group">
        <label for="nome"><i class="fas fa-user"></i> Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome completo">
    </div>

    <div class="form-group">
        <label for="telefone"><i class="fas fa-phone"></i> Telefone</label>
        <input type="tel" id="telefone" placeholder="(xx) 9xxxx-xxxx">
    </div>

    <div class="form-group">
        <label for="senha"><i class="fas fa-lock"></i> Senha</label>
        <input type="password" id="senha" placeholder="Escolha uma senha segura">
    </div>

    <div class="form-group">
        <label for="confirmSenha"><i class="fas fa-check-circle"></i> Confirmar Senha</label>
        <input type="password" id="confirmSenha" placeholder="Confirme sua senha">
    </div>

    <div class="form-group">
        <label for="codigoConvite"><i class="fas fa-ticket-alt"></i> Código de Convite</label>
        <input type="text" id="codigoConvite" placeholder="Digite o código (opcional)">
    </div>

    <div id="msgConvite" class="msg" style="display:none;"></div>

    <button onclick="cadastrar()" id="btnCadastrar">
        <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i> Criar Conta
    </button>

    <div class="divider">
        <span>OU</span>
    </div>

    <p class="footer-link">
        Já tem uma conta? <a href="login.html">Entre aqui →</a>
    </p>

    <div class="features">
        <div class="feature-item">
            <i class="fas fa-shield-alt"></i>
            Seguro
        </div>
        <div class="feature-item">
            <i class="fas fa-lightning-bolt"></i>
            Rápido
        </div>
        <div class="feature-item">
            <i class="fas fa-headset"></i>
            Suporte
        </div>
    </div>
</div>

<script>
// Usar Sistema de Autenticação Centralizado

// auto preencher convite
const url=new URL(window.location.href);
const ref=url.searchParams.get("ref") || url.searchParams.get("invite");
if(ref){
  const campo=document.getElementById("codigoConvite");
  campo.value=ref;
  campo.readOnly=true;
}

async function cadastrar(){
    const nome=nomeEl.value.trim();
    const telefone=telefoneEl.value.trim();
    const senha=senhaEl.value;
    const confirmSenha=confirmSenhaEl.value;
    const convite=codigoConvite.value.trim() || null;
    const btn = document.getElementById("btnCadastrar");
    const auth = window.SistemaAuth?.auth;
    const db = window.SistemaAuth?.db;

    if (!auth || !db) {
      alert('❌ Erro de autenticação. Recarregue a página.');
      return;
    }

    if(!nome || !telefone || !senha){
        alert("Preencha todos os campos.");
        return;
    }
    if(senha!==confirmSenha){
        alert("Senhas não coincidem.");
        return;
    }

    // Desabilitar botão durante o processo
    btn.disabled = true;
    const textOriginal = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i> Verificando...';

    try{
        // ✅ VERIFICAR SE TELEFONE JÁ EXISTE
        const telefoneDuplicado = await db.collection("users")
            .where("telefone", "==", telefone)
            .limit(1)
            .get();

        if(!telefoneDuplicado.empty){
            btn.disabled = false;
            btn.innerHTML = textOriginal;
            alert("❌ Telefone já cadastrado no sistema!");
            telefoneEl.focus();
            telefoneEl.style.borderColor = "#ef4444";
            return;
        }

        // ✅ VALIDAR CÓDIGO DE CONVITE (se fornecido)
        if(convite){
            const codigoValido = await db.collection("users")
                .where("codigoIndicacao", "==", convite)
                .limit(1)
                .get();

            if(codigoValido.empty){
                btn.disabled = false;
                btn.innerHTML = textOriginal;
                alert("❌ Código de convite inválido!");
                codigoConvite.focus();
                codigoConvite.style.borderColor = "#ef4444";
                return;
            }
        }

        btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i> Criando conta...';

        const email=`user${Date.now()}@noemail.local`;

        const cred=await auth.createUserWithEmailAndPassword(email,senha);
        const user=cred.user;

        // Usar o UID como código de indicação
        const codigoIndicacao = user.uid;

        // Salvar usuário com campos de comissão
        await db.collection("users").doc(user.uid).set({
            uid:user.uid,
            email:email,
            authEmail:email,
            nome,
            telefone,
            ref:convite,
            codigoIndicacao: codigoIndicacao,
            indicadorId: convite, // Campo padronizado para o indicador
            saldo: 0,
            comissaoTotal: 0,
            totalIndicados: 0,
            nivel1:0,
            nivel2:0,
            nivel3:0,
            createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });

        // ✅ Registrar indicação se houver código de convite
        if(convite){
            try{
                // 1️⃣ Buscar usuário que indicou
                const indicadorQuery = await db.collection("users")
                    .where("codigoIndicacao", "==", convite)
                    .limit(1)
                    .get();

                if(!indicadorQuery.empty){
                    const indicadorDoc = indicadorQuery.docs[0];
                    const idIndicador = indicadorDoc.id;

                    // 2️⃣ Registrar na coleção de indicações
                    await db.collection("indicacoes").add({
                        idIndicador: idIndicador,
                        idIndicado: user.uid,
                        codigoIndicacao: convite,
                        nomeIndicado: nome,
                        status: "pendente",
                        data: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // 3️⃣ Incrementar totalIndicados
                    await db.collection("users").doc(idIndicador).update({
                        totalIndicados: firebase.firestore.FieldValue.increment(1)
                    });

                    console.log("✅ Indicação registrada: " + idIndicador + " indicou " + user.uid);
                }
            }catch(erro){
                console.error("⚠️ Erro ao registrar indicação:", erro);
            }
        }

        alert("✅ Cadastro realizado com sucesso!");
        try{ sessionStorage.setItem('showGroupPanel','1'); }catch(e){}
        window.location.href="login.html";

    }catch(e){
        btn.disabled = false;
        btn.innerHTML = textOriginal;
        alert("❌ Erro: " + e.message);
    }
}

const nomeEl=document.getElementById("nome");
const telefoneEl=document.getElementById("telefone");
const senhaEl=document.getElementById("senha");
const confirmSenhaEl=document.getElementById("confirmSenha");
const codigoConvite=document.getElementById("codigoConvite");
</script>

</body>
</html>
